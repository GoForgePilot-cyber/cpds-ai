# CPDS-AI Source Configuration
# Controls which sources run, their weights, and health thresholds

sources:

  hacker_news:
    enabled: true
    tier: 1
    weight: 1.4          # boosted — HN audience is senior technical, high WTP
    min_score: 50        # minimum HN points to include a story
    max_results: 20
    include_types:       # HN post types to ingest
      - story
      - ask
      - show
    health_threshold:
      min_results_per_run: 3
      empty_runs_before_alert: 2

  github:
    enabled: true
    tier: 1
    weight: 1.3          # strong launch signal
    min_star_delta: 25   # minimum stars gained in 7 days to surface a repo
    max_results: 15
    health_threshold:
      min_results_per_run: 2
      empty_runs_before_alert: 3

  n8n_forum:
    enabled: true
    tier: 1
    weight: 1.5          # highest weight — exact target audience
    min_replies: 3
    max_results: 15
    health_threshold:
      min_results_per_run: 5
      empty_runs_before_alert: 2

  indie_hackers:
    enabled: true
    tier: 1
    weight: 1.2          # revenue-validated signals
    max_results: 10
    health_threshold:
      min_results_per_run: 3
      empty_runs_before_alert: 3

  google_trends:
    enabled: true
    tier: 1
    weight: 0.8          # directional only, not primary signal
    timeframe: "today 1-m"
    max_results: 10
    health_threshold:
      min_results_per_run: 1
      empty_runs_before_alert: 5

  devto:
    enabled: true
    tier: 1
    weight: 1.0
    top_days: 7
    min_reactions: 20
    max_results: 10
    health_threshold:
      min_results_per_run: 2
      empty_runs_before_alert: 3

  emis_bridge:
    enabled: true
    tier: 1
    weight: 2.0          # highest weight — EMIS is the primary pipeline
    health_threshold:
      min_results_per_run: 1
      empty_runs_before_alert: 1  # alert immediately if EMIS export missing

  product_hunt:
    enabled: false       # enable after receiving API token
    tier: 2
    weight: 1.3
    min_votes: 100
    max_results: 10
    health_threshold:
      min_results_per_run: 2
      empty_runs_before_alert: 3

  fiverr:
    enabled: false       # enable after vertical confirmed
    tier: 2
    weight: 1.1
    max_results: 20
    health_threshold:
      min_results_per_run: 5
      empty_runs_before_alert: 3

  upwork:
    enabled: false       # enable after vertical confirmed
    tier: 2
    weight: 1.2          # slightly higher — has budget attached
    max_results: 15
    health_threshold:
      min_results_per_run: 3
      empty_runs_before_alert: 3

  stackoverflow:
    enabled: false       # enable after vertical confirmed
    tier: 2
    weight: 0.9
    min_score: 5
    max_results: 10
    health_threshold:
      min_results_per_run: 3
      empty_runs_before_alert: 4

# ── Global settings ─────────────────────────────────────────────────────────

dedup_window_days: 14    # don't re-surface a signal seen in last 14 days
max_signals_per_run: 50  # cap total signals going into curate.py
signals_output_path: sources/weekly_signals.json
seen_ids_path: sources/seen_ids.json
